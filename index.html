<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friendswood Nails & Spa</title>
    <script type="module" crossorigin src="./assets/index-CPf1oju8.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CWqVtSzb.css">
    <style>
      :root {
        --fws-gold: #C9A84C;
        --fws-gold-light: #E8D28A;
      }

      .fws-fx-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9998;
        overflow: hidden;
        will-change: transform;
      }

      .fws-glitter {
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: radial-gradient(circle, var(--fws-gold-light) 0%, var(--fws-gold) 55%, transparent 75%);
        box-shadow: 0 0 6px var(--fws-gold-light), 0 0 14px var(--fws-gold);
        opacity: 0;
        animation: fws-float-up linear forwards;
        filter: blur(0.3px);
      }

      .fws-glitter.fws-star::before,
      .fws-glitter.fws-star::after {
        content: "";
        position: absolute;
        inset: -3px;
        background: inherit;
        border-radius: inherit;
        box-shadow: inherit;
        transform: rotate(45deg);
      }

      @keyframes fws-float-up {
        0%   { transform: translate3d(0, 0, 0) rotate(0deg) scale(0.6); opacity: 0; }
        12%  { opacity: 0.95; }
        50%  { transform: translate3d(var(--fws-drift, 30px), -45vh, 0) rotate(180deg) scale(1); }
        100% { transform: translate3d(calc(var(--fws-drift, 30px) * 2), -110vh, 0) rotate(360deg) scale(0.4); opacity: 0; }
      }

      .fws-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(40px);
        opacity: 0.35;
        mix-blend-mode: screen;
        animation: fws-drift 18s ease-in-out infinite alternate;
      }
      .fws-orb-1 { width: 320px; height: 320px; top: 10%; left: -80px;  background: radial-gradient(circle, rgba(232,210,138,0.6), transparent 65%); animation-duration: 22s; }
      .fws-orb-2 { width: 260px; height: 260px; top: 55%; right: -60px; background: radial-gradient(circle, rgba(201,168,76,0.55), transparent 65%); animation-duration: 26s; animation-delay: -6s; }
      .fws-orb-3 { width: 220px; height: 220px; bottom: 5%; left: 35%;  background: radial-gradient(circle, rgba(245,240,232,0.45), transparent 65%); animation-duration: 30s; animation-delay: -12s; }

      @keyframes fws-drift {
        0%   { transform: translate(0, 0) scale(1); }
        50%  { transform: translate(40px, -60px) scale(1.1); }
        100% { transform: translate(-30px, 30px) scale(0.95); }
      }

      .fws-spark {
        position: fixed;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: radial-gradient(circle, #fff 0%, var(--fws-gold-light) 40%, var(--fws-gold) 70%, transparent 80%);
        box-shadow: 0 0 8px var(--fws-gold-light);
        pointer-events: none;
        z-index: 9999;
        animation: fws-spark-fade 700ms ease-out forwards;
      }
      @keyframes fws-spark-fade {
        0%   { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(0.2) translateY(14px); opacity: 0; }
      }

      .fws-progress {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: transparent;
        z-index: 10000;
        pointer-events: none;
      }
      .fws-progress::after {
        content: "";
        display: block;
        height: 100%;
        width: var(--fws-progress, 0%);
        background: linear-gradient(90deg, transparent, var(--fws-gold-light), var(--fws-gold), var(--fws-gold-light), transparent);
        box-shadow: 0 0 12px var(--fws-gold);
        transition: width 80ms linear;
      }

      .fws-reveal {
        opacity: 0;
        transform: translateY(24px);
        transition: opacity 800ms cubic-bezier(.2,.7,.2,1), transform 800ms cubic-bezier(.2,.7,.2,1);
        will-change: opacity, transform;
      }
      .fws-reveal.fws-in {
        opacity: 1;
        transform: translateY(0);
      }

      #root img { transition: transform 600ms cubic-bezier(.2,.7,.2,1), filter 400ms ease; }
      #root img:hover { transform: scale(1.03); filter: brightness(1.05) saturate(1.1); }

      #root a, #root button { transition: transform 250ms ease, box-shadow 250ms ease, color 250ms ease, background-color 250ms ease; }
      #root a:hover, #root button:hover { transform: translateY(-1px); }

      @media (prefers-reduced-motion: reduce) {
        .fws-fx-layer, .fws-spark, .fws-progress { display: none !important; }
        .fws-reveal { opacity: 1; transform: none; transition: none; }
        #root img:hover { transform: none; filter: none; }
      }

      /* ── Real Reviews Override ── */
      .fws-reviews-wrap {
        position: relative;
        max-width: 1100px;
        margin: 0 auto;
        padding: 80px 24px 72px;
      }
      .fws-reviews-eyebrow {
        font-size: 10px;
        letter-spacing: .16em;
        text-transform: uppercase;
        font-weight: 700;
        color: #C9A84C;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
      }
      .fws-reviews-heading {
        color: #fff;
        font-size: clamp(2rem, 5vw, 2.75rem);
        font-weight: 700;
        letter-spacing: .04em;
        font-family: 'Playfair Display', Georgia, serif;
        line-height: 1.1;
        margin: 0 0 8px;
      }
      .fws-reviews-sub {
        color: #9CA3AF;
        font-size: 1rem;
        margin: 0 0 48px;
      }
      .fws-reviews-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
      }
      .fws-review-card {
        background: rgba(255,255,255,.03);
        border: 1px solid rgba(201,168,76,.15);
        border-radius: 14px;
        padding: 28px 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        transition: border-color 300ms ease, box-shadow 300ms ease;
      }
      .fws-review-card:hover {
        border-color: rgba(201,168,76,.4);
        box-shadow: 0 0 28px rgba(201,168,76,.07);
      }
      .fws-review-stars {
        display: flex;
        gap: 3px;
      }
      .fws-review-stars svg { width: 14px; height: 14px; }
      .fws-review-text {
        color: #D1D5DB;
        font-size: .95rem;
        line-height: 1.65;
        flex: 1;
      }
      .fws-review-author {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .fws-review-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, #C9A84C, #E8D28A);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: .85rem;
        font-weight: 700;
        color: #1a1a1a;
        flex-shrink: 0;
      }
      .fws-review-name { color: #fff; font-size: .9rem; font-weight: 600; }
      .fws-review-source { color: #6B7280; font-size: .78rem; margin-top: 1px; }
      .fws-reviews-badge {
        margin-top: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: #9CA3AF;
        font-size: .85rem;
      }
      .fws-reviews-badge strong { color: #C9A84C; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="fws-progress" aria-hidden="true"></div>
    <div class="fws-fx-layer" aria-hidden="true">
      <div class="fws-orb fws-orb-1"></div>
      <div class="fws-orb fws-orb-2"></div>
      <div class="fws-orb fws-orb-3"></div>
    </div>

    <!-- ── Real Reviews Injector ── -->
    <script>
      (function () {
        var REVIEWS = [
          {
            name: "Jennifer M.",
            initials: "JM",
            text: "YEN always does an awesome job. I really only go there for her because I am so picky. She does them thin, even, and super natural on my natural nails as a dip. Never any complaints.",
            source: "Google Review",
            stars: 5
          },
          {
            name: "Ashley R.",
            initials: "AR",
            text: "I have been to Friendswood Nails & Spa recently and love their service! My most recent set of acrylics completed by Tiffany are my favorite nails I've ever had. Highly recommend!",
            source: "Google Review",
            stars: 5
          },
          {
            name: "Brittany K.",
            initials: "BK",
            text: "From my first visit I knew I found my new salon. My manicures and pedicures are done well, last a long time, and done in a timely fashion. Truly the only nail salon I trust in this area — and I've tried many.",
            source: "Yelp Review",
            stars: 5
          },
          {
            name: "Sarah T.",
            initials: "ST",
            text: "They were quick and efficient. Sweet and personable. Made sure I was happy with the color and shape before continuing. Would definitely go back.",
            source: "Google Review",
            stars: 5
          },
          {
            name: "Monica L.",
            initials: "ML",
            text: "I absolutely loved my pedicure and my nails look perfect! The technician did an excellent job. The spa is very clean and the staff are friendly and talented.",
            source: "Google Review",
            stars: 5
          },
          {
            name: "Danielle W.",
            initials: "DW",
            text: "I love this place — they are my go-to nail salon! I always call ahead and have zero wait time. Very flexible with timing and what you want. Extremely well priced and very clean.",
            source: "Yelp Review",
            stars: 5
          }
        ];

        function starSVG() {
          return '<svg viewBox="0 0 24 24" fill="#C9A84C"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>';
        }

        function buildReviews() {
          var cards = REVIEWS.map(function (r) {
            var stars = '';
            for (var i = 0; i < r.stars; i++) stars += starSVG();
            return (
              '<div class="fws-review-card">' +
                '<div class="fws-review-stars">' + stars + '</div>' +
                '<p class="fws-review-text">\u201C' + r.text + '\u201D</p>' +
                '<div class="fws-review-author">' +
                  '<div class="fws-review-avatar">' + r.initials + '</div>' +
                  '<div>' +
                    '<div class="fws-review-name">' + r.name + '</div>' +
                    '<div class="fws-review-source">' + r.source + '</div>' +
                  '</div>' +
                '</div>' +
              '</div>'
            );
          }).join('');

          return (
            '<div class="fws-reviews-wrap">' +
              '<div class="fws-reviews-eyebrow">Client Reviews</div>' +
              '<h2 class="fws-reviews-heading">WHAT OUR<br>CLIENTS SAY</h2>' +
              '<p class="fws-reviews-sub">Real reviews from real clients in Friendswood & Houston.</p>' +
              '<div class="fws-reviews-grid">' + cards + '</div>' +
              '<div class="fws-reviews-badge">' +
                '<strong>\u2605 4.6</strong> rating &nbsp;&bull;&nbsp; Verified Google &amp; Yelp reviews' +
              '</div>' +
            '</div>'
          );
        }

        var revObserver = null;

        function injectReviews() {
          var sec = document.getElementById('reviews') ||
                    document.getElementById('testimonials');

          /* fallback: find a section whose heading text contains "review" or "testimonial" */
          if (!sec) {
            var sections = document.querySelectorAll('#root section');
            for (var i = 0; i < sections.length; i++) {
              var txt = sections[i].innerText || '';
              if (/review|testimonial|what.*client|what.*people/i.test(txt)) {
                sec = sections[i];
                break;
              }
            }
          }

          if (!sec) return false;
          if (sec.querySelector('.fws-review-card')) return true;

          sec.innerHTML = buildReviews();

          if (!revObserver && window.MutationObserver) {
            revObserver = new MutationObserver(function () {
              if (!sec.querySelector('.fws-review-card')) {
                sec.innerHTML = buildReviews();
              }
            });
            revObserver.observe(sec, { childList: true });
          }
          return true;
        }

        var t = setInterval(function () {
          if (injectReviews()) clearInterval(t);
        }, 200);
        setTimeout(function () { clearInterval(t); }, 15000);
      })();
    </script>

    <!-- ── Remove "Online Booking" text labels from React-rendered DOM ── -->
    <script>
      (function () {
        var STRIP_PATTERNS = [/online\s+booking/i, /book\s+online/i];

        function stripBookingLabels(root) {
          var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
          var nodes = [];
          var node;
          while ((node = walker.nextNode())) nodes.push(node);
          nodes.forEach(function (n) {
            STRIP_PATTERNS.forEach(function (re) {
              if (re.test(n.nodeValue)) {
                /* replace the label with a neutral "Appointments" */
                n.nodeValue = n.nodeValue.replace(/online\s+booking/gi, 'Appointments').replace(/book\s+online/gi, 'Book Appointment');
              }
            });
          });
        }

        var appRoot = document.getElementById('root');
        if (!appRoot) return;

        var mo = new MutationObserver(function (mutations) {
          mutations.forEach(function (m) {
            m.addedNodes.forEach(function (n) {
              if (n.nodeType === 1) stripBookingLabels(n);
            });
          });
        });
        mo.observe(appRoot, { childList: true, subtree: true });

        /* also run once after initial render */
        setTimeout(function () { stripBookingLabels(appRoot); }, 1500);
      })();
    </script>

    <script>
      (function () {
        var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (reduce) return;

        var fxLayer = document.querySelector('.fws-fx-layer');
        var progress = document.querySelector('.fws-progress');

        function spawnGlitter() {
          if (document.hidden) return;
          var g = document.createElement('span');
          g.className = 'fws-glitter';
          var size = 3 + Math.random() * 6;
          var drift = (Math.random() * 120 - 60).toFixed(0) + 'px';
          var duration = (8 + Math.random() * 8).toFixed(1) + 's';
          var leftPct = Math.random() * 100;
          g.style.width = size + 'px';
          g.style.height = size + 'px';
          g.style.left = leftPct + '%';
          g.style.bottom = '-20px';
          g.style.setProperty('--fws-drift', drift);
          g.style.animationDuration = duration;
          g.style.animationDelay = (Math.random() * 1.2).toFixed(2) + 's';
          fxLayer.appendChild(g);
          var ttl = parseFloat(duration) * 1000 + 1500;
          setTimeout(function () { g.remove(); }, ttl);
        }

        var glitterInterval = setInterval(spawnGlitter, 380);
        for (var i = 0; i < 12; i++) setTimeout(spawnGlitter, i * 90);

        var lastSpark = 0;
        document.addEventListener('mousemove', function (e) {
          var now = performance.now();
          if (now - lastSpark < 50) return;
          lastSpark = now;
          var s = document.createElement('span');
          s.className = 'fws-spark';
          s.style.left = e.clientX + 'px';
          s.style.top = e.clientY + 'px';
          var jitterX = (Math.random() * 14 - 7).toFixed(1) + 'px';
          var jitterY = (Math.random() * 14 - 7).toFixed(1) + 'px';
          s.style.transform = 'translate(calc(-50% + ' + jitterX + '), calc(-50% + ' + jitterY + '))';
          document.body.appendChild(s);
          setTimeout(function () { s.remove(); }, 750);
        }, { passive: true });

        document.addEventListener('click', function (e) {
          for (var i = 0; i < 10; i++) {
            (function (k) {
              setTimeout(function () {
                var s = document.createElement('span');
                s.className = 'fws-spark';
                var angle = (Math.PI * 2 * k) / 10;
                var dist = 18 + Math.random() * 22;
                s.style.left = (e.clientX + Math.cos(angle) * dist) + 'px';
                s.style.top = (e.clientY + Math.sin(angle) * dist) + 'px';
                document.body.appendChild(s);
                setTimeout(function () { s.remove(); }, 750);
              }, k * 18);
            })(i);
          }
        }, { passive: true });

        function updateProgress() {
          var doc = document.documentElement;
          var max = (doc.scrollHeight - doc.clientHeight) || 1;
          var pct = Math.min(100, Math.max(0, (window.scrollY / max) * 100));
          progress.style.setProperty('--fws-progress', pct.toFixed(2) + '%');
        }
        var ticking = false;
        window.addEventListener('scroll', function () {
          if (!ticking) {
            window.requestAnimationFrame(function () { updateProgress(); ticking = false; });
            ticking = true;
          }
        }, { passive: true });
        updateProgress();

        function attachReveals() {
          var nodes = document.querySelectorAll('#root section, #root section > div, #root section h1, #root section h2, #root section h3, #root section img');
          if (!('IntersectionObserver' in window) || !nodes.length) return;
          var io = new IntersectionObserver(function (entries) {
            entries.forEach(function (en) {
              if (en.isIntersecting) {
                en.target.classList.add('fws-in');
                io.unobserve(en.target);
              }
            });
          }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
          nodes.forEach(function (n) {
            if (n.classList.contains('fws-reveal')) return;
            n.classList.add('fws-reveal');
            io.observe(n);
          });
        }

        var revealTimer = setInterval(function () {
          if (document.querySelectorAll('#root section').length) {
            attachReveals();
            clearInterval(revealTimer);
          }
        }, 250);
        setTimeout(function () { clearInterval(revealTimer); }, 8000);

        document.addEventListener('visibilitychange', function () {
          if (document.hidden) {
            clearInterval(glitterInterval);
          } else {
            glitterInterval = setInterval(spawnGlitter, 380);
          }
        });
      })();
    </script>
  </body>
</html>
